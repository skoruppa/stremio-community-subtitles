services:
  app:
    build: .
    restart: always
    ports:
      - "${FLASK_RUN_PORT:-4949}:4949"
    env_file:
      - .env
    environment:
      - FLASK_APP=wsgi.py
      - FLASK_ENV=${FLASK_ENV:-production}
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-mysql+aiomysql://stremio:stremio_pass@db:3306/stremio_subs}
      - DISABLE_EMAIL_VERIFICATION=${DISABLE_EMAIL_VERIFICATION:-true}
      - MAIL_SERVER=${MAIL_SERVER:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-True}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - MAL_CLIENT_ID=${MAL_CLIENT_ID:-}
      - BETTERSTACK_SOURCE_TOKEN=${BETTERSTACK_SOURCE_TOKEN:-}
      - PREFERRED_URL_SCHEME=${PREFERRED_URL_SCHEME:-https}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-15}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./subtitles:/app/subtitles
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4949/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_change_me}
      MARIADB_DATABASE: stremio_subs
      MARIADB_USER: stremio
      MARIADB_PASSWORD: ${DB_PASSWORD:-stremio_pass}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "0.0.0.0:3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=100
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=64M
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:
